runtime:
  output_dir: runs
  temp_dir: tmp
  debug: true
  process_timeout_seconds: 300

ocr:
  provider: rapidocr

translator:
  provider: google
  src_lang: auto
  tgt_lang: ja

inpaint:
  provider: opencv
  expand_pixels: 8
  mask_version: v4

# comfyui section is optional. Remove or comment out this block entirely
# to run the engine without any ComfyUI dependency.
# Retained here for reference only — ComfyUI is no longer in the production path.
#
# comfyui:
#   server: "127.0.0.1:8188"
#   root_dir: D:/comfyui2/ComfyUI
#   workflow_file: workflows/workflow_layerstyle_260315_api.json
#   request_timeout_seconds: 120
#   max_consecutive_failures: 3
#   degradation_cooldown_seconds: 300

render:
  font_path: C:\Windows\Fonts\msyh.ttc
  stroke_enabled: true
